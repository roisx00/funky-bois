<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <!-- paper bg -->
  <rect width="1200" height="675" fill="#F9F6F0"/>

  <!-- top + bottom rules -->
  <line x1="60" y1="80" x2="1140" y2="80" stroke="#0E0E0E" stroke-width="1"/>
  <line x1="60" y1="595" x2="1140" y2="595" stroke="#0E0E0E" stroke-width="1"/>

  <!-- top meta -->
  <text x="60" y="64" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#0E0E0E">FIGURE C · POST-MINT · WHAT COMES AFTER</text>
  <text x="1140" y="64" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#0E0E0E">THE 1969</text>

  <!-- HEADLINE -->
  <text x="60" y="150" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="52" fill="#0E0E0E" letter-spacing="-1.4">The mint is a checkpoint,</text>
  <text x="60" y="200" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="52" fill="#0E0E0E" letter-spacing="-1.4">not a destination.</text>
  <line x1="60" y1="222" x2="160" y2="222" stroke="#D7FF3A" stroke-width="5"/>

  <!-- ─── 2x2 GRID OF CARDS ─── -->
  <g transform="translate(60, 260)">

    <!-- TOP-LEFT · The Vault Evolves -->
    <g>
      <rect x="0" y="0" width="540" height="155" fill="transparent" stroke="#0E0E0E" stroke-width="1.5"/>
      <!-- icon: keep with arrow forward -->
      <g transform="translate(28, 30)">
        <rect x="0" y="0" width="44" height="48" fill="#161616" stroke="#0E0E0E" stroke-width="1"/>
        <rect x="2" y="2" width="40" height="6" fill="#F9F6F0" fill-opacity="0.3"/>
        <rect x="18" y="22" width="8" height="20" fill="#D7FF3A"/>
        <text x="62" y="32" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="2" fill="#0E0E0E">→</text>
      </g>
      <text x="100" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">§I · ON-CHAIN TRANSITION</text>
      <text x="100" y="80" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="28" fill="#0E0E0E" letter-spacing="-0.6">The Vault evolves.</text>
      <text x="28" y="120" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">Off-chain today, on-chain after mint. Same state machine,</text>
      <text x="28" y="138" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">same upgrades, same permanence. Genesis is the snapshot.</text>
    </g>

    <!-- TOP-RIGHT · The Games (lime hero) -->
    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="520" height="155" fill="rgba(215,255,58,0.12)" stroke="#0E0E0E" stroke-width="1.5"/>
      <!-- icon: bar chart / progression -->
      <g transform="translate(28, 30)">
        <rect x="0" y="32" width="8" height="16" fill="#0E0E0E"/>
        <rect x="14" y="20" width="8" height="28" fill="#0E0E0E"/>
        <rect x="28" y="8" width="8" height="40" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1"/>
        <rect x="42" y="0" width="8" height="48" fill="#0E0E0E"/>
      </g>
      <text x="100" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">§II · COMPETITION</text>
      <text x="100" y="80" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="28" fill="#0E0E0E" letter-spacing="-0.6">The games.</text>
      <text x="28" y="120" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">Vaults become the unit of play. Eight upgrade tracks. Three</text>
      <text x="28" y="138" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">tiers each. Win conditions multiply. Loss never destroys.</text>
    </g>

    <!-- BOTTOM-LEFT · $BUSTS -->
    <g transform="translate(0, 175)">
      <rect x="0" y="0" width="540" height="155" fill="transparent" stroke="#0E0E0E" stroke-width="1.5"/>
      <!-- icon: coin -->
      <g transform="translate(50, 54)">
        <circle cx="0" cy="0" r="26" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="2"/>
        <circle cx="0" cy="0" r="20" fill="none" stroke="#0E0E0E" stroke-width="1" stroke-dasharray="2 2"/>
        <text x="0" y="6" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="22" fill="#0E0E0E">$B</text>
      </g>
      <text x="100" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">§III · ECONOMY</text>
      <text x="100" y="80" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="28" fill="#0E0E0E" letter-spacing="-0.6">$BUSTS.</text>
      <text x="28" y="120" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">The off-chain economy is staged for a transition. Holders</text>
      <text x="28" y="138" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">should expect a more durable form. Nothing is reset.</text>
    </g>

    <!-- BOTTOM-RIGHT · The Reveal -->
    <g transform="translate(560, 175)">
      <rect x="0" y="0" width="520" height="155" fill="transparent" stroke="#0E0E0E" stroke-width="1.5"/>
      <!-- icon: sealed placeholder -->
      <g transform="translate(28, 30)">
        <rect x="0" y="0" width="48" height="48" fill="#0E0E0E"/>
        <text x="24" y="34" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-size="32" fill="#D7FF3A">?</text>
        <rect x="0" y="44" width="48" height="4" fill="#D7FF3A"/>
      </g>
      <text x="100" y="46" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">§IV · MOMENT</text>
      <text x="100" y="80" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="28" fill="#0E0E0E" letter-spacing="-0.6">The reveal.</text>
      <text x="28" y="120" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">Sealed at mint with a placeholder. The full 1,969 portraits</text>
      <text x="28" y="138" font-family="Georgia, serif" font-size="13" fill="#3A3A3A">unlock together when the assembly is complete.</text>
    </g>
  </g>

  <!-- DOCTRINE BAR -->
  <line x1="60" y1="565" x2="1140" y2="565" stroke="#D7FF3A" stroke-width="2"/>
  <text x="600" y="557" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="6" fill="#0E0E0E" opacity="0.7">⌬  THE VAULT MUST NOT BURN AGAIN  ⌬</text>

  <!-- footer -->
  <text x="60" y="640" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#0E0E0E">opensea.io/collection/the1969</text>
  <text x="600" y="640" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">§11 LITEPAPER</text>
  <text x="1140" y="640" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#0E0E0E">@the1969eth</text>
</svg>
