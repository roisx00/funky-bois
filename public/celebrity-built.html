<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>THE 1969 · celebrity built card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" />
<style>
  :root { --paper:#F9F6F0; --paper-2:#F2EEE6; --ink:#0E0E0E; --lime:#D7FF3A; }
  html,body{margin:0;padding:0;background:#1a1a1a;color:#fff;font-family:'JetBrains Mono',ui-monospace,monospace;}
  header{padding:20px 28px;border-bottom:1px solid #333;}
  header h1{margin:0;font-family:'Instrument Serif',serif;font-style:italic;font-size:24px;color:var(--lime);}
  header p{margin:4px 0 0;opacity:.8;font-size:11px;line-height:1.5;}
  main{display:flex;flex-direction:column;gap:24px;padding:24px;align-items:center;}
  .stage{background:repeating-conic-gradient(#1e1e1e 0 25%, #171717 0 50%) 50% / 16px 16px;padding:20px;}
  canvas{display:block;background:var(--paper);}
  .controls{display:flex;gap:12px;align-items:center;}
  button{font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 18px;background:var(--lime);color:var(--ink);border:1px solid var(--ink);cursor:pointer;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
  button:hover{background:#fff;}
  .hint{font-size:11px;color:#888;letter-spacing:.04em;}
</style>
</head>
<body>
<header>
  <h1>THE 1969 · celebrity built card</h1>
  <p>Mirrors the @realDonaldTrump tweet template. Defaults to @elonmusk; pass <code>?handle=…&amp;followers=…&amp;bg=…</code> etc. via URL to retarget.</p>
</header>

<main>
  <div class="stage">
    <canvas id="card" width="1200" height="1500"></canvas>
  </div>
  <div class="controls">
    <span class="hint" id="info">loading.</span>
    <button onclick="downloadPNG()">Download PNG</button>
  </div>
</main>

<script type="module">
import { buildNFTSVG } from './article-art.js';

// ─── Defaults: Elon ───────────────────────────────────────────────
const defaults = {
  handle: 'elonmusk',
  followers: '219.0M',
  background: 7, outfit: 5, skin: 2, eyes: 7,
  facial_hair: 1, hair: 2, headwear: 1, face_mark: 2,
};

const params = new URLSearchParams(location.search);
function num(key, fallback) {
  const v = params.get(key);
  return v == null || v === '' ? fallback : Number(v);
}
const cfg = {
  handle:    params.get('handle')    || defaults.handle,
  followers: params.get('followers') || defaults.followers,
  background:  num('bg',         defaults.background),
  outfit:      num('outfit',     defaults.outfit),
  skin:        num('skin',       defaults.skin),
  eyes:        num('eyes',       defaults.eyes),
  facial_hair: num('fh',         defaults.facial_hair),
  hair:        num('hair',       defaults.hair),
  headwear:    num('hw',         defaults.headwear),
  face_mark:   num('fm',         defaults.face_mark),
};

document.getElementById('info').textContent =
  `@${cfg.handle} · ${cfg.followers} followers · use ?handle=… to retarget`;

const today = new Date().toISOString().slice(0, 10);

// ─── Render the card ──────────────────────────────────────────────
const canvas = document.getElementById('card');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

async function render() {
  const W = canvas.width, H = canvas.height;

  // Body — cream paper
  ctx.fillStyle = '#F9F6F0';
  ctx.fillRect(0, 0, W, H);

  // ─── Top dark header bar ───────────────────────────────────────
  const HEADER_H = 56;
  ctx.fillStyle = '#0E0E0E';
  ctx.fillRect(0, 0, W, HEADER_H);
  ctx.fillStyle = '#F9F6F0';
  ctx.font = '500 16px "JetBrains Mono", monospace';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('THE 1969  ·  MONOCHROME PORTRAITS  ·  ETHEREUM', 32, HEADER_H / 2);
  ctx.textAlign = 'right';
  ctx.fillText(`ISSUE ${today}`, W - 32, HEADER_H / 2);

  // ─── Portrait area ─────────────────────────────────────────────
  const PORTRAIT_TOP  = HEADER_H + 60;
  const PORTRAIT_SIZE = 900;
  const PORTRAIT_X    = (W - PORTRAIT_SIZE) / 2;

  // Rasterize the portrait SVG
  const elements = {
    background: cfg.background,
    outfit:     cfg.outfit,
    skin:       cfg.skin,
    eyes:       cfg.eyes,
    facial_hair:cfg.facial_hair,
    hair:       cfg.hair,
    headwear:   cfg.headwear,
    face_mark:  cfg.face_mark,
  };
  const svg = buildNFTSVG(elements);
  const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const img = new Image();
  await new Promise((res, rej) => {
    img.onload = res;
    img.onerror = rej;
    img.src = url;
  });
  ctx.drawImage(img, PORTRAIT_X, PORTRAIT_TOP, PORTRAIT_SIZE, PORTRAIT_SIZE);
  URL.revokeObjectURL(url);

  // ─── Followers badge — yellow accent, top-left of portrait ─────
  const badgeText = `${cfg.followers.toUpperCase()} FOLLOWERS`;
  ctx.font = '700 26px "JetBrains Mono", monospace';
  const badgeMetrics = ctx.measureText(badgeText);
  const badgeW = badgeMetrics.width + 36;
  const badgeH = 50;
  const badgeX = PORTRAIT_X + 24;
  const badgeY = PORTRAIT_TOP + 24;
  ctx.fillStyle = '#D7FF3A';
  ctx.fillRect(badgeX, badgeY, badgeW, badgeH);
  ctx.fillStyle = '#0E0E0E';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText(badgeText, badgeX + 18, badgeY + badgeH / 2);

  // ─── Handle (big display) ──────────────────────────────────────
  const HANDLE_Y = PORTRAIT_TOP + PORTRAIT_SIZE + 100;
  ctx.fillStyle = '#0E0E0E';
  ctx.font = '500 88px "Space Grotesk", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(`@${cfg.handle}`, W / 2, HANDLE_Y);

  // ─── Subtitle (italic serif) ───────────────────────────────────
  ctx.fillStyle = '#5C5C5C';
  ctx.font = 'italic 32px "Instrument Serif", serif';
  ctx.fillText('just built their bust.', W / 2, HANDLE_Y + 50);

  // ─── Footer ────────────────────────────────────────────────────
  const FOOTER_Y = H - 36;
  // Hairline above footer
  ctx.strokeStyle = '#0E0E0E';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(32, H - 70);
  ctx.lineTo(W - 32, H - 70);
  ctx.stroke();
  ctx.fillStyle = '#0E0E0E';
  ctx.font = '500 16px "JetBrains Mono", monospace';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('the1969.io', 32, FOOTER_Y);
  ctx.textAlign = 'right';
  ctx.fillText('@the1969eth', W - 32, FOOTER_Y);
}

// Wait for fonts before rendering so text isn't drawn with the
// fallback font (which wrecks the layout).
document.fonts.ready.then(() => render());

window.downloadPNG = function downloadPNG() {
  canvas.toBlob((blob) => {
    if (!blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `the1969-${cfg.handle}-built.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
};
</script>
</body>
</html>
