<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- paper bg -->
  <rect width="1920" height="1080" fill="#F9F6F0"/>

  <!-- top + bottom inner rules -->
  <line x1="80" y1="80" x2="1840" y2="80" stroke="#0E0E0E" stroke-width="1"/>
  <line x1="80" y1="1000" x2="1840" y2="1000" stroke="#0E0E0E" stroke-width="1"/>

  <!-- top meta -->
  <text x="80" y="64" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#0E0E0E">THE 1969 · MINT REMINDER · ETHEREUM</text>
  <text x="1840" y="64" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#0E0E0E">DAYS TO MINT</text>

  <!-- corner brackets -->
  <g stroke="#0E0E0E" stroke-width="2" fill="none">
    <path d="M 80 130 L 80 170 M 80 130 L 120 130"/>
    <path d="M 1840 130 L 1840 170 M 1840 130 L 1800 130"/>
  </g>

  <!-- KICKER -->
  <g transform="translate(120, 230)">
    <circle cx="6" cy="-4" r="6" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1"/>
    <text x="22" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="4" fill="#0E0E0E">A QUIET REMINDER</text>
  </g>

  <!-- HEADLINE -->
  <text x="120" y="380" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#0E0E0E" letter-spacing="-2.5">connect your</text>
  <text x="120" y="500" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#0E0E0E" letter-spacing="-2.5">wallet.</text>

  <!-- LIME RULE -->
  <line x1="120" y1="540" x2="280" y2="540" stroke="#D7FF3A" stroke-width="6"/>

  <!-- SUBLINE -->
  <text x="120" y="600" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#3A3A3A">Without a bound wallet, the seat exists but cannot mint.</text>

  <!-- 3-STEP PATH -->
  <g transform="translate(120, 680)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#5C5C5C">THE PATH</text>
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="280" height="64" fill="transparent" stroke="#0E0E0E" stroke-width="1.5"/>
      <text x="140" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2.5" fill="#0E0E0E">DASHBOARD</text>
    </g>
    <text x="296" y="74" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#0E0E0E">→</text>
    <g transform="translate(322, 30)">
      <rect x="0" y="0" width="240" height="64" fill="transparent" stroke="#0E0E0E" stroke-width="1.5"/>
      <text x="120" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2.5" fill="#0E0E0E">OVERVIEW</text>
    </g>
    <text x="578" y="74" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="22" fill="#0E0E0E">→</text>
    <g transform="translate(604, 30)">
      <rect x="0" y="0" width="320" height="64" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.5"/>
      <text x="160" y="40" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2.5" fill="#0E0E0E">CONNECT WALLET</text>
    </g>
  </g>

  <!-- TWO TIER CARDS RIGHT -->
  <!-- Tier 1 -->
  <g transform="translate(1200, 230)">
    <rect x="0" y="0" width="600" height="220" fill="rgba(215,255,58,0.10)" stroke="#0E0E0E" stroke-width="2"/>
    <text x="32" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">§I · GUARANTEED</text>
    <text x="32" y="92" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="44" fill="#0E0E0E" letter-spacing="-0.8">Tier 1</text>
    <text x="32" y="140" font-family="Georgia, serif" font-size="16" fill="#0E0E0E">If you built a portrait.</text>
    <text x="32" y="166" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3A3A3A">0.002 ETH. One per wallet. A guaranteed seat.</text>
    <text x="32" y="200" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" font-weight="700" fill="#0E0E0E">→ DASHBOARD · OVERVIEW · CONNECT WALLET</text>
  </g>

  <!-- Tier 2 -->
  <g transform="translate(1200, 480)">
    <rect x="0" y="0" width="600" height="220" fill="transparent" stroke="#0E0E0E" stroke-width="2"/>
    <text x="32" y="40" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">§II · FIRST COME</text>
    <text x="32" y="92" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="44" fill="#0E0E0E" letter-spacing="-0.8">Tier 2</text>
    <text x="32" y="140" font-family="Georgia, serif" font-size="16" fill="#0E0E0E">If you were pre-approved for the drop.</text>
    <text x="32" y="166" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#3A3A3A">Same 0.002 ETH price. Competitive window.</text>
    <text x="32" y="200" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" font-weight="700" fill="#0E0E0E">→ DASHBOARD · OVERVIEW · CONNECT WALLET</text>
  </g>

  <!-- DOCTRINE -->
  <text x="120" y="900" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="4" fill="#0E0E0E" opacity="0.55">⌬ THE VAULT MUST NOT BURN AGAIN</text>

  <!-- footer -->
  <text x="80" y="1040" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#0E0E0E">the1969.io</text>
  <text x="960" y="1040" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#5C5C5C">DAYS TO MINT . DON'T LOSE THE SEAT</text>
  <text x="1840" y="1040" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#0E0E0E">@the1969eth</text>
</svg>
