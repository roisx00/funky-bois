<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, system-ui, sans-serif">
  <!-- BACKGROUND -->
  <rect width="1600" height="900" fill="#F9F6F0"/>

  <!-- TOP LIME RIBBON -->
  <rect x="0" y="0" width="1600" height="6" fill="#D7FF3A"/>

  <!-- TOP RULE -->
  <line x1="72" y1="78" x2="1528" y2="78" stroke="#0E0E0E" stroke-width="1"/>

  <!-- KICKER -->
  <g transform="translate(72, 56)">
    <circle cx="6" cy="-4" r="6.5" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.4"/>
    <text x="24" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">THE 1969 · ECONOMY · LIVE SNAPSHOT</text>
  </g>

  <text x="1528" y="56" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.2" fill="#0E0E0E">MAY 1 · MINT @ 14:00 UTC</text>

  <!-- VERTICAL DIVIDER -->
  <line x1="800" y1="160" x2="800" y2="640" stroke="#0E0E0E" stroke-width="1"/>

  <!-- ── LEFT: HERO CIRCULATION ── -->
  <g transform="translate(400, 220)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="14" font-weight="700" letter-spacing="6" fill="#5C5C5C">$BUSTS IN MOTION</text>

    <text x="0" y="180" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="170" fill="#0E0E0E" letter-spacing="-4">4,885,560</text>

    <line x1="-180" y1="220" x2="180" y2="220" stroke="#D7FF3A" stroke-width="10"/>

    <text x="0" y="270" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="32" fill="#5C5C5C" letter-spacing="-0.5">circulating · off-chain</text>
    <text x="0" y="320" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="700" letter-spacing="3.5" fill="#0E0E0E">2,437,060 LOCKED · 50%</text>
    <text x="0" y="346" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="11" letter-spacing="2.8" fill="#5C5C5C">18,828 HOLDERS · 344,700 BURNED</text>
  </g>

  <!-- ── RIGHT: P2P ── -->
  <g transform="translate(1200, 200)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="14" font-weight="700" letter-spacing="6" fill="#5C5C5C">PEER-TO-PEER WIRES</text>

    <!-- All-time -->
    <text x="0" y="80" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="11" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">ALL-TIME</text>
    <text x="0" y="160" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="100" fill="#0E0E0E" letter-spacing="-2">49,401</text>
    <text x="0" y="200" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#0E0E0E">6.97M $BUSTS ROUTED</text>

    <line x1="-200" y1="240" x2="200" y2="240" stroke="#D7FF3A" stroke-width="6"/>

    <!-- Last 24h -->
    <text x="0" y="290" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="11" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">LAST 24 HOURS</text>
    <text x="0" y="370" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="100" fill="#0E0E0E" letter-spacing="-2">2,158</text>
    <text x="0" y="410" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#0E0E0E">570K $BUSTS · 24H</text>
  </g>

  <!-- LIME RIBBON -->
  <g transform="translate(72, 700)">
    <rect x="0" y="0" width="1456" height="58" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.4"/>
    <text x="22" y="38" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="20" font-weight="700" letter-spacing="6" fill="#0E0E0E">THE ECONOMY</text>
    <text x="728" y="40" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="32" fill="#0E0E0E" letter-spacing="-0.5">is alive. and it's only the start.</text>
    <text x="1432" y="40" text-anchor="end"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="38" fill="#0E0E0E" letter-spacing="-1">→</text>
  </g>

  <!-- BOTTOM RULE -->
  <line x1="72" y1="852" x2="1528" y2="852" stroke="#0E0E0E" stroke-width="1"/>

  <!-- FOOTER -->
  <text x="72" y="884" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">@THE1969ETH</text>
  <text x="800" y="884" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">THE1969.IO</text>
  <text x="1528" y="884" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">MINT · 14:00 UTC</text>
</svg>
