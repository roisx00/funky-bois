<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="Inter, system-ui, sans-serif">
  <!-- BACKGROUND -->
  <rect width="1080" height="1080" fill="#F9F6F0"/>

  <!-- TOP LIME RIBBON -->
  <rect x="0" y="0" width="1080" height="6" fill="#D7FF3A"/>

  <!-- TOP RULE -->
  <line x1="64" y1="84" x2="1016" y2="84" stroke="#0E0E0E" stroke-width="1"/>

  <!-- KICKER -->
  <g transform="translate(64, 60)">
    <circle cx="6" cy="-4" r="7" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.4"/>
    <text x="26" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="3.6" fill="#0E0E0E">THE 1969 · ECONOMY · LIVE SNAPSHOT</text>
  </g>

  <text x="1016" y="60" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3.4" fill="#0E0E0E">MAY 1 · MINT @ 14:00 UTC</text>

  <!-- ── HORIZONTAL DIVIDER between hero + P2P ── -->
  <line x1="120" y1="540" x2="960" y2="540" stroke="#0E0E0E" stroke-width="1"/>

  <!-- ── TOP HALF: HERO CIRCULATION ── -->
  <g transform="translate(540, 200)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="14" font-weight="700" letter-spacing="6" fill="#5C5C5C">$BUSTS IN MOTION</text>

    <text x="0" y="170" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="170" fill="#0E0E0E" letter-spacing="-4">4,885,560</text>

    <line x1="-180" y1="210" x2="180" y2="210" stroke="#D7FF3A" stroke-width="10"/>

    <text x="0" y="258" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="32" fill="#5C5C5C" letter-spacing="-0.5">circulating · off-chain</text>

    <text x="0" y="304" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="700" letter-spacing="3.5" fill="#0E0E0E">2,437,060 LOCKED · 50%</text>
    <text x="0" y="328" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="11" letter-spacing="2.8" fill="#5C5C5C">18,828 HOLDERS · 344,700 BURNED</text>
  </g>

  <!-- ── BOTTOM HALF: P2P ── -->
  <g transform="translate(540, 600)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="14" font-weight="700" letter-spacing="6" fill="#5C5C5C">PEER-TO-PEER WIRES</text>
  </g>

  <!-- Two columns of P2P -->
  <line x1="540" y1="640" x2="540" y2="900" stroke="#0E0E0E" stroke-width="1"/>

  <!-- LEFT col: ALL-TIME -->
  <g transform="translate(290, 670)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="12" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">ALL-TIME</text>
    <text x="0" y="100" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="120" fill="#0E0E0E" letter-spacing="-2.5">6.97M</text>
    <text x="0" y="148" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#0E0E0E">$BUSTS</text>
    <text x="0" y="180" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="11" letter-spacing="2.6" fill="#5C5C5C">49,401 WIRES</text>
  </g>

  <!-- RIGHT col: LAST 24H -->
  <g transform="translate(790, 670)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="12" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">LAST 24 HOURS</text>
    <text x="0" y="100" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="120" fill="#0E0E0E" letter-spacing="-2.5">570K</text>
    <text x="0" y="148" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="700" letter-spacing="3" fill="#0E0E0E">$BUSTS</text>
    <text x="0" y="180" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="11" letter-spacing="2.6" fill="#5C5C5C">2,158 WIRES</text>
  </g>

  <!-- ── LIME RIBBON ── -->
  <g transform="translate(64, 940)">
    <rect x="0" y="0" width="952" height="58" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.4"/>
    <text x="22" y="38" font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="18" font-weight="700" letter-spacing="6" fill="#0E0E0E">THE ECONOMY</text>
    <text x="476" y="40" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="30" fill="#0E0E0E" letter-spacing="-0.5">is alive. and it's only the start.</text>
    <text x="930" y="40" text-anchor="end"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="34" fill="#0E0E0E" letter-spacing="-1">→</text>
  </g>

  <!-- BOTTOM RULE -->
  <line x1="64" y1="1024" x2="1016" y2="1024" stroke="#0E0E0E" stroke-width="1"/>

  <!-- FOOTER -->
  <text x="64" y="1056" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">@THE1969ETH</text>
  <text x="1016" y="1056" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">THE1969.IO</text>
</svg>
