<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" font-family="Inter, system-ui, sans-serif">
  <!-- BACKGROUND -->
  <rect width="1080" height="1080" fill="#F9F6F0"/>

  <!-- TOP LIME RIBBON -->
  <rect x="0" y="0" width="1080" height="6" fill="#D7FF3A"/>

  <!-- TOP RULE -->
  <line x1="64" y1="84" x2="1016" y2="84" stroke="#0E0E0E" stroke-width="1"/>

  <!-- KICKER -->
  <g transform="translate(64, 60)">
    <circle cx="6" cy="-4" r="7" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.4"/>
    <text x="26" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="3.6" fill="#0E0E0E">THE 1969 · ECONOMY · LIVE</text>
  </g>

  <text x="1016" y="60" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3.4" fill="#0E0E0E">MAY 1 · SNAPSHOT</text>

  <!-- ── HERO: TOTAL CIRCULATION ── -->
  <g transform="translate(540, 180)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="14" font-weight="700" letter-spacing="6" fill="#5C5C5C">$BUSTS IN MOTION</text>

    <text x="0" y="120" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="150" fill="#0E0E0E"
          letter-spacing="-3">4,885,560</text>

    <line x1="-180" y1="148" x2="180" y2="148" stroke="#D7FF3A" stroke-width="9"/>

    <text x="0" y="190" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="28" fill="#5C5C5C" letter-spacing="-0.5">circulating · off-chain</text>
  </g>

  <!-- ── 3 stat cells ── -->
  <g transform="translate(64, 440)">
    <rect x="0" y="0" width="952" height="220" fill="#F2EEE6" stroke="#0E0E0E" stroke-width="1"/>
    <line x1="317.3" y1="0" x2="317.3" y2="220" stroke="#0E0E0E" stroke-width="1"/>
    <line x1="634.7" y1="0" x2="634.7" y2="220" stroke="#0E0E0E" stroke-width="1"/>

    <!-- Cell 1: VAULTED -->
    <g transform="translate(158.7, 60)">
      <text x="0" y="0" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace"
            font-size="12" font-weight="700" letter-spacing="3.6" fill="#5C5C5C">VAULTED</text>
      <text x="0" y="80" text-anchor="middle"
            font-family="'Instrument Serif', Georgia, serif"
            font-style="italic" font-weight="500"
            font-size="78" fill="#0E0E0E" letter-spacing="-2.5">2,437,060</text>
      <text x="0" y="124" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace"
            font-size="12" letter-spacing="3" fill="#0E0E0E" font-weight="700">50% LOCKED</text>
    </g>

    <!-- Cell 2: HOLDERS -->
    <g transform="translate(476, 60)">
      <text x="0" y="0" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace"
            font-size="12" font-weight="700" letter-spacing="3.6" fill="#5C5C5C">HOLDERS</text>
      <text x="0" y="80" text-anchor="middle"
            font-family="'Instrument Serif', Georgia, serif"
            font-style="italic" font-weight="500"
            font-size="78" fill="#0E0E0E" letter-spacing="-2.5">18,828</text>
      <text x="0" y="124" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace"
            font-size="12" letter-spacing="3" fill="#5C5C5C">WITH BALANCE > 0</text>
    </g>

    <!-- Cell 3: BURNED -->
    <g transform="translate(793.3, 60)">
      <text x="0" y="0" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace"
            font-size="12" font-weight="700" letter-spacing="3.6" fill="#5C5C5C">BURNED</text>
      <text x="0" y="80" text-anchor="middle"
            font-family="'Instrument Serif', Georgia, serif"
            font-style="italic" font-weight="500"
            font-size="78" fill="#0E0E0E" letter-spacing="-2.5">344,700</text>
      <text x="0" y="124" text-anchor="middle"
            font-family="ui-monospace, 'JetBrains Mono', monospace"
            font-size="12" letter-spacing="3" fill="#0E0E0E" font-weight="700">+131K · 24H</text>
    </g>
  </g>

  <!-- ── P2P panel (dark, prominent) ── -->
  <g transform="translate(64, 700)">
    <rect x="0" y="0" width="952" height="220" fill="#0E0E0E"/>
    <rect x="0" y="0" width="6" height="220" fill="#D7FF3A"/>

    <text x="40" y="46"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="700" letter-spacing="3.8" fill="#D7FF3A">P2P · WIRES BETWEEN HOLDERS</text>

    <!-- Vertical divider between all-time and 24h -->
    <line x1="476" y1="76" x2="476" y2="200" stroke="rgba(215,255,58,0.3)" stroke-width="1"/>

    <!-- ALL-TIME (left half) -->
    <text x="40" y="100"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="12" font-weight="700" letter-spacing="3.4" fill="rgba(249,246,240,0.55)">ALL-TIME</text>
    <text x="40" y="180"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="92" fill="#F9F6F0" letter-spacing="-2.5">6.97M</text>
    <text x="40" y="208"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="12" font-weight="700" letter-spacing="3" fill="rgba(249,246,240,0.7)">$BUSTS · 49,401 WIRES</text>

    <!-- LAST 24H (right half) -->
    <text x="510" y="100"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="12" font-weight="700" letter-spacing="3.4" fill="rgba(249,246,240,0.55)">LAST 24H</text>
    <text x="510" y="180"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="92" fill="#D7FF3A" letter-spacing="-2.5">570K</text>
    <text x="510" y="208"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="12" font-weight="700" letter-spacing="3" fill="rgba(249,246,240,0.7)">$BUSTS · 2,158 WIRES</text>
  </g>

  <!-- BOTTOM RULE -->
  <line x1="64" y1="965" x2="1016" y2="965" stroke="#0E0E0E" stroke-width="1"/>

  <!-- FOOTER -->
  <text x="64" y="1000" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">@THE1969ETH</text>
  <text x="540" y="1000" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-size="20" fill="#5C5C5C" letter-spacing="-0.5">the economy is alive.</text>
  <text x="1016" y="1000" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">MINT · 14:00 UTC</text>

  <!-- Bottom lime ribbon -->
  <rect x="0" y="1074" width="1080" height="6" fill="#D7FF3A"/>
</svg>
