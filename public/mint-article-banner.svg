<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <!-- BG -->
  <rect width="1600" height="900" fill="#0E0E0E"/>

  <!-- soft lime glow -->
  <radialGradient id="g" cx="78%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#D7FF3A" stop-opacity="0.10"/>
    <stop offset="60%" stop-color="#D7FF3A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#g)"/>

  <!-- vault-cell grid -->
  <g opacity="0.05" stroke="#F9F6F0" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#D7FF3A" stroke-width="3" fill="none">
    <path d="M 50 50 L 50 100 M 50 50 L 100 50"/>
    <path d="M 1550 50 L 1550 100 M 1550 50 L 1500 50"/>
    <path d="M 50 850 L 50 800 M 50 850 L 100 850"/>
    <path d="M 1550 850 L 1550 800 M 1550 850 L 1500 850"/>
  </g>

  <!-- TOP META -->
  <g transform="translate(100, 130)">
    <circle cx="6" cy="-4" r="6" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1"/>
    <text x="22" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" letter-spacing="4" fill="#F9F6F0" opacity="0.7">THE 1969 · MINT BRIEFING</text>
  </g>
  <text x="1500" y="126" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#F9F6F0" opacity="0.5">ETHEREUM · 1,969 EDITIONS</text>

  <!-- HEADLINE -->
  <text x="100" y="380" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="148" fill="#F9F6F0" letter-spacing="-3">a mint day</text>
  <text x="100" y="520" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="148" fill="#F9F6F0" letter-spacing="-3">briefing.</text>

  <!-- LIME RULE -->
  <line x1="100" y1="560" x2="280" y2="560" stroke="#D7FF3A" stroke-width="6"/>

  <!-- SUBLINE -->
  <text x="100" y="615" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#F9F6F0" opacity="0.7">The complete operating manual for May 1.</text>
  <text x="100" y="650" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#F9F6F0" opacity="0.7">Stages, eligibility, action items.</text>

  <!-- 4 STAGE PILLS -->
  <g transform="translate(100, 720)">
    <g>
      <rect x="0" y="0" width="200" height="56" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1"/>
      <text x="100" y="36" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2.5" fill="#0E0E0E">PROPHET · 0.00</text>
    </g>
    <g transform="translate(216, 0)">
      <rect x="0" y="0" width="200" height="56" fill="transparent" stroke="rgba(249,246,240,0.4)" stroke-width="1"/>
      <text x="100" y="36" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2.5" fill="#F9F6F0">TIER 1 · 0.002</text>
    </g>
    <g transform="translate(432, 0)">
      <rect x="0" y="0" width="200" height="56" fill="transparent" stroke="rgba(249,246,240,0.4)" stroke-width="1"/>
      <text x="100" y="36" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2.5" fill="#F9F6F0">TIER 2 · 0.002</text>
    </g>
    <g transform="translate(648, 0)">
      <rect x="0" y="0" width="200" height="56" fill="transparent" stroke="rgba(249,246,240,0.4)" stroke-width="1"/>
      <text x="100" y="36" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="2.5" fill="#F9F6F0">PUBLIC · 0.005</text>
    </g>
  </g>

  <!-- DATE STAMP RIGHT -->
  <g transform="translate(1240, 460)">
    <rect x="-180" y="-220" width="360" height="440" fill="#161616" stroke="rgba(215,255,58,0.4)" stroke-width="2"/>
    <g stroke="#D7FF3A" stroke-width="2.5" fill="none">
      <path d="M -160 -200 L -160 -170 M -160 -200 L -130 -200"/>
      <path d="M  160 -200 L  160 -170 M  160 -200 L  130 -200"/>
      <path d="M -160  200 L -160  170 M -160  200 L -130  200"/>
      <path d="M  160  200 L  160  170 M  160  200 L  130  200"/>
    </g>
    <text x="0" y="-130" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="6" fill="#D7FF3A" opacity="0.85">MINT DATE</text>
    <text x="0" y="20" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="148" fill="#F9F6F0" letter-spacing="-2">MAY 1</text>
    <line x1="-80" y1="60" x2="80" y2="60" stroke="#D7FF3A" stroke-width="3"/>
    <text x="0" y="110" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="4" fill="#F9F6F0" opacity="0.7">2026</text>
    <text x="0" y="150" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="4" fill="#F9F6F0" opacity="0.55">10:00 AM EDT</text>
  </g>

  <!-- footer line -->
  <line x1="100" y1="820" x2="1500" y2="820" stroke="#F9F6F0" stroke-opacity="0.18" stroke-width="1"/>
  <text x="100" y="855" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3" fill="#F9F6F0" opacity="0.55">opensea.io/collection/the1969</text>
  <text x="800" y="855" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3" fill="#F9F6F0" opacity="0.4">⌬ THE VAULT MUST NOT BURN AGAIN</text>
  <text x="1500" y="855" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3" fill="#F9F6F0" opacity="0.55">@the1969eth</text>
</svg>
