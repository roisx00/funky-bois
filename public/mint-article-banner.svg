<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <!-- BG -->
  <rect width="1500" height="500" fill="#0E0E0E"/>

  <!-- soft lime glow -->
  <radialGradient id="g" cx="78%" cy="35%" r="55%">
    <stop offset="0%" stop-color="#D7FF3A" stop-opacity="0.10"/>
    <stop offset="60%" stop-color="#D7FF3A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1500" height="500" fill="url(#g)"/>

  <!-- vault-cell grid -->
  <g opacity="0.05" stroke="#F9F6F0" stroke-width="1">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1250" y1="0" x2="1250" y2="500"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#D7FF3A" stroke-width="2.5" fill="none">
    <path d="M 30 30 L 30 65 M 30 30 L 65 30"/>
    <path d="M 1470 30 L 1470 65 M 1470 30 L 1435 30"/>
    <path d="M 30 470 L 30 435 M 30 470 L 65 470"/>
    <path d="M 1470 470 L 1470 435 M 1470 470 L 1435 470"/>
  </g>

  <!-- TOP META -->
  <g transform="translate(70, 80)">
    <circle cx="6" cy="-4" r="6" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1"/>
    <text x="22" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="4" fill="#F9F6F0" opacity="0.7">THE 1969 · MINT BRIEFING</text>
  </g>
  <text x="1430" y="76" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#F9F6F0" opacity="0.5">ETHEREUM · 1,969 EDITIONS</text>

  <!-- HEADLINE -->
  <text x="70" y="220" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="116" fill="#F9F6F0" letter-spacing="-2.5">a mint day briefing.</text>

  <!-- LIME RULE -->
  <line x1="70" y1="252" x2="240" y2="252" stroke="#D7FF3A" stroke-width="6"/>

  <!-- SUBLINE -->
  <text x="70" y="305" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#F9F6F0" opacity="0.7">The complete operating manual for May 1. Stages, eligibility, action items.</text>

  <!-- 4 STAGE PILLS (compact) -->
  <g transform="translate(70, 360)">
    <g>
      <rect x="0" y="0" width="180" height="48" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1"/>
      <text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2.5" fill="#0E0E0E">PROPHET · 0.00</text>
    </g>
    <g transform="translate(196, 0)">
      <rect x="0" y="0" width="180" height="48" fill="transparent" stroke="rgba(249,246,240,0.4)" stroke-width="1"/>
      <text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2.5" fill="#F9F6F0">TIER 1 · 0.002</text>
    </g>
    <g transform="translate(392, 0)">
      <rect x="0" y="0" width="180" height="48" fill="transparent" stroke="rgba(249,246,240,0.4)" stroke-width="1"/>
      <text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2.5" fill="#F9F6F0">TIER 2 · 0.002</text>
    </g>
    <g transform="translate(588, 0)">
      <rect x="0" y="0" width="180" height="48" fill="transparent" stroke="rgba(249,246,240,0.4)" stroke-width="1"/>
      <text x="90" y="32" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2.5" fill="#F9F6F0">PUBLIC · 0.005</text>
    </g>
  </g>

  <!-- DATE STAMP RIGHT -->
  <g transform="translate(1180, 175)">
    <rect x="0" y="0" width="240" height="200" fill="#161616" stroke="rgba(215,255,58,0.35)" stroke-width="2"/>
    <g stroke="#D7FF3A" stroke-width="2" fill="none">
      <path d="M 8 8 L 8 24 M 8 8 L 24 8"/>
      <path d="M 232 192 L 232 176 M 232 192 L 216 192"/>
    </g>
    <text x="120" y="44" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="4" fill="#D7FF3A" opacity="0.85">MINT DATE</text>
    <text x="120" y="118" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="76" fill="#F9F6F0" letter-spacing="-1">MAY 1</text>
    <line x1="40" y1="138" x2="200" y2="138" stroke="#D7FF3A" stroke-width="2"/>
    <text x="120" y="168" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3" fill="#F9F6F0" opacity="0.7">2026 · 10:00 AM EDT</text>
  </g>

  <!-- footer line -->
  <text x="70" y="466" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#F9F6F0" opacity="0.45">opensea.io/collection/the1969 · the1969.io · @the1969eth</text>
</svg>
