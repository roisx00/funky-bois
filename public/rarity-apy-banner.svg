  <line x1="72" y1="852" x2="1528" y2="852" stroke="rgba(249,246,240,0.18)" stroke-width="1"/>
  <text x="72"   y="884" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#F9F6F0">@THE1969ETH</text>
  <text x="800"  y="884" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="rgba(249,246,240,0.45)">VAULT1969 · 0x5aa4…6203 · ETH MAINNET</text>
  <text x="1528" y="884" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#F9F6F0">THE1969.IO/VAULT</text>

  <rect x="0" y="894" width="1600" height="6" fill="#D7FF3A"/>
</svg>
