    <!-- RARE -->
    <g transform="translate(376, 0)">
      <rect x="0" y="0" width="356" height="380" fill="rgba(0,0,0,0.4)" stroke="rgba(249,246,240,0.18)"/>
      <text x="178" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="4" fill="rgba(249,246,240,0.55)">RARE</text>
      <text x="178" y="170" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#F9F6F0" letter-spacing="-3">3×</text>
      <line x1="50" y1="200" x2="306" y2="200" stroke="rgba(215,255,58,0.4)" stroke-width="2"/>
      <text x="178" y="280" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="64" fill="#D7FF3A" letter-spacing="-2">~1,180%</text>
      <text x="178" y="332" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.4" fill="rgba(249,246,240,0.5)">APY · LIVE</text>
    </g>

    <!-- LEGENDARY -->
    <g transform="translate(752, 0)">
      <rect x="0" y="0" width="356" height="380" fill="rgba(255,212,58,0.07)" stroke="rgba(255,212,58,0.4)"/>
      <text x="178" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="4" fill="rgba(255,212,58,0.7)">LEGENDARY</text>
      <text x="178" y="170" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#F9F6F0" letter-spacing="-3">8×</text>
      <line x1="50" y1="200" x2="306" y2="200" stroke="rgba(215,255,58,0.4)" stroke-width="2"/>
      <text x="178" y="280" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="64" fill="#D7FF3A" letter-spacing="-2">~3,140%</text>
      <text x="178" y="332" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.4" fill="rgba(249,246,240,0.5)">APY · LIVE</text>
    </g>

    <!-- ULTRA RARE -->
    <g transform="translate(1128, 0)">
      <rect x="0" y="0" width="356" height="380" fill="rgba(215,255,58,0.10)" stroke="#D7FF3A"/>
      <text x="178" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="4" fill="#D7FF3A">ULTRA RARE</text>
      <text x="178" y="170" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#F9F6F0" letter-spacing="-3">25×</text>
      <line x1="50" y1="200" x2="306" y2="200" stroke="#D7FF3A" stroke-width="2"/>
      <text x="178" y="280" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="64" fill="#D7FF3A" letter-spacing="-2">~9,800%</text>
      <text x="178" y="332" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.4" fill="rgba(249,246,240,0.5)">APY · LIVE</text>
