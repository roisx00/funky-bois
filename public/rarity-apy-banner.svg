<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, system-ui, sans-serif">
  <!-- BACKGROUND -->
  <rect width="1600" height="900" fill="#0A0A0A"/>

  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(215,255,58,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%"   stop-color="rgba(215,255,58,0.14)"/>
      <stop offset="55%"  stop-color="rgba(215,255,58,0.03)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <rect x="0" y="0" width="1600" height="6" fill="#D7FF3A"/>
  <line x1="72" y1="78" x2="1528" y2="78" stroke="rgba(249,246,240,0.18)" stroke-width="1"/>

  <!-- KICKER -->
  <g transform="translate(72, 56)">
    <circle cx="6" cy="-4" r="8" fill="#D7FF3A">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="26" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#D7FF3A">RARITY APY · LIVE</text>
  </g>

  <text x="1528" y="56" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.2" fill="rgba(249,246,240,0.7)">DROPS AS MORE DEPOSIT</text>

  <!-- HEADLINE -->
  <text x="800" y="180"
        text-anchor="middle"
        font-family="'Instrument Serif', Georgia, serif"
        font-style="italic" font-weight="500"
        font-size="72" fill="#F9F6F0" letter-spacing="-2">stake rarity = <tspan fill="#D7FF3A">stake reward.</tspan></text>

  <!-- 4 RARITY CELLS -->
  <g transform="translate(72, 260)">
    <!-- COMMON -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="356" height="380" fill="rgba(0,0,0,0.4)" stroke="rgba(249,246,240,0.18)"/>
      <text x="178" y="56" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" font-weight="700" letter-spacing="4" fill="rgba(249,246,240,0.55)">COMMON</text>
      <text x="178" y="170" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#F9F6F0" letter-spacing="-3">1×</text>
      <line x1="50" y1="200" x2="306" y2="200" stroke="rgba(215,255,58,0.4)" stroke-width="2"/>
      <text x="178" y="280" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="64" fill="#D7FF3A" letter-spacing="-2">~390%</text>
      <text x="178" y="332" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.4" fill="rgba(249,246,240,0.5)">APY · LIVE</text>
