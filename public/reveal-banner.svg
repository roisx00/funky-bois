<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, system-ui, sans-serif">
  <!-- BACKGROUND — black with stacked aurora glow for ceremony -->
  <rect width="1600" height="900" fill="#0A0A0A"/>

  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(215,255,58,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="auroraTop" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="rgba(215,255,58,0.18)"/>
      <stop offset="40%"  stop-color="rgba(215,255,58,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="centerHalo" cx="50%" cy="48%" r="55%">
      <stop offset="0%"   stop-color="rgba(215,255,58,0.18)"/>
      <stop offset="55%"  stop-color="rgba(215,255,58,0.03)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#auroraTop)"/>
  <rect width="1600" height="900" fill="url(#centerHalo)"/>

  <!-- TOP LIME RIBBON -->
  <rect x="0" y="0" width="1600" height="6" fill="#D7FF3A"/>

  <line x1="72" y1="78" x2="1528" y2="78" stroke="rgba(249,246,240,0.18)" stroke-width="1"/>

  <!-- KICKER -->
  <g transform="translate(72, 56)">
    <circle cx="6" cy="-4" r="8" fill="#D7FF3A">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="26" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#D7FF3A">REVEAL · LIVE NOW</text>
  </g>

  <text x="1528" y="56" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.2" fill="rgba(249,246,240,0.7)">1969 / 1969 · UNSEALED</text>

  <!-- ── PORTRAIT LINEUP — 4 sneak-peek tiles centered ── -->
  <g transform="translate(540, 130)">
    <!-- frames -->
    <rect x="-4"   y="-4" width="138" height="138" fill="none" stroke="#D7FF3A" stroke-width="2"/>
    <rect x="166"  y="-4" width="138" height="138" fill="none" stroke="rgba(249,246,240,0.6)" stroke-width="2"/>
    <rect x="336"  y="-4" width="138" height="138" fill="none" stroke="#FFD43A" stroke-width="2"/>
    <rect x="506"  y="-4" width="138" height="138" fill="none" stroke="rgba(249,246,240,0.6)" stroke-width="2"/>

    <!-- portraits via <image> referencing existing sneak-peek SVGs -->
    <image href="sneak-peek-elonmusk.svg"        x="0"   y="0" width="130" height="130" preserveAspectRatio="xMidYMid slice"/>
    <image href="sneak-peek-realdonaldtrump.svg" x="170" y="0" width="130" height="130" preserveAspectRatio="xMidYMid slice"/>
    <image href="sneak-peek-web3eliza.svg"       x="340" y="0" width="130" height="130" preserveAspectRatio="xMidYMid slice"/>
    <image href="sneak-peek-waleswoosh.svg"      x="510" y="0" width="130" height="130" preserveAspectRatio="xMidYMid slice"/>

    <!-- rarity ribbons under each tile -->
    <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" font-weight="700" letter-spacing="2.2">
      <text x="65"  y="156" text-anchor="middle" fill="#D7FF3A">ULTRA RARE</text>
      <text x="235" y="156" text-anchor="middle" fill="rgba(249,246,240,0.5)">COMMON</text>
      <text x="405" y="156" text-anchor="middle" fill="#FFD43A">LEGENDARY</text>
      <text x="575" y="156" text-anchor="middle" fill="rgba(249,246,240,0.5)">RARE</text>
    </g>
  </g>

  <!-- ── HERO HEADLINE ── -->
  <g transform="translate(800, 460)">
    <text x="0" y="0" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="180" fill="#F9F6F0"
          letter-spacing="-5"><tspan fill="#D7FF3A">Revealed</tspan>.</text>

    <line x1="-180" y1="40" x2="180" y2="40" stroke="#D7FF3A" stroke-width="9"/>

    <text x="0" y="106" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="36" fill="rgba(249,246,240,0.85)"
          letter-spacing="-0.5">the 1969 are out. find yours.</text>
  </g>

  <!-- ── LIME CTA RIBBON ── -->
  <g transform="translate(72, 720)">
    <rect x="0" y="0" width="1456" height="84" fill="#D7FF3A"/>
    <text x="40" y="54"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="22" font-weight="700" letter-spacing="6" fill="#0E0E0E">VIEW YOUR PORTRAIT</text>
    <text x="900" y="56" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="38" fill="#0E0E0E"
          letter-spacing="-0.5">opensea.io/collection/the1969</text>
    <text x="1416" y="54" text-anchor="end"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="44" fill="#0E0E0E" letter-spacing="-1">→</text>
  </g>

  <!-- BOTTOM RULE + FOOTER -->
  <line x1="72" y1="852" x2="1528" y2="852" stroke="rgba(249,246,240,0.18)" stroke-width="1"/>
  <text x="72"   y="884" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#F9F6F0">@THE1969ETH</text>
  <text x="800"  y="884" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="rgba(249,246,240,0.45)">THE 1969 · 0x890d…7efab · ERC-721</text>
  <text x="1528" y="884" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#F9F6F0">THE1969.IO</text>

  <rect x="0" y="894" width="1600" height="6" fill="#D7FF3A"/>
</svg>
