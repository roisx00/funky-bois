<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <!-- paper bg -->
  <rect width="1200" height="675" fill="#F9F6F0"/>

  <!-- top + bottom rules -->
  <line x1="60" y1="80" x2="1140" y2="80" stroke="#0E0E0E" stroke-width="1"/>
  <line x1="60" y1="595" x2="1140" y2="595" stroke="#0E0E0E" stroke-width="1"/>

  <!-- top meta -->
  <text x="60" y="64" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#0E0E0E">FIGURE A · MINT TIMELINE · MAY 1, 2026</text>
  <text x="1140" y="64" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="3" fill="#0E0E0E">ETHEREUM</text>

  <!-- HEADLINE -->
  <text x="60" y="160" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="58" fill="#0E0E0E" letter-spacing="-1.5">The mint day timeline.</text>
  <line x1="60" y1="184" x2="160" y2="184" stroke="#D7FF3A" stroke-width="5"/>
  <text x="60" y="220" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#3A3A3A">Four stages, sequential. Each carries its own seat. Unminted supply rolls forward.</text>

  <!-- THE TRACK -->
  <line x1="120" y1="380" x2="1080" y2="380" stroke="#0E0E0E" stroke-width="2"/>

  <!-- 4 STAGE NODES -->
  <!-- Prophet -->
  <g transform="translate(180, 380)">
    <circle cx="0" cy="0" r="14" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="2"/>
    <text x="0" y="-50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">10:00 EDT</text>
    <text x="0" y="-26" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="26" fill="#0E0E0E" letter-spacing="-0.5">Prophet</text>
    <text x="0" y="42" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#0E0E0E">0.00 ETH</text>
    <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">team reserve</text>
    <text x="0" y="80" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">cap by csv</text>
  </g>
  <!-- Tier 1 -->
  <g transform="translate(480, 380)">
    <circle cx="0" cy="0" r="14" fill="#0E0E0E" stroke="#D7FF3A" stroke-width="3"/>
    <text x="0" y="-50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">10:30 EDT</text>
    <text x="0" y="-26" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="26" fill="#0E0E0E" letter-spacing="-0.5">Tier 1 GTD</text>
    <text x="0" y="42" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#0E0E0E">0.002 ETH</text>
    <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">built and bound</text>
    <text x="0" y="80" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">1 / wallet</text>
  </g>
  <!-- Tier 2 -->
  <g transform="translate(780, 380)">
    <circle cx="0" cy="0" r="14" fill="#0E0E0E" stroke="#0E0E0E" stroke-width="2"/>
    <text x="0" y="-50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">11:30 EDT</text>
    <text x="0" y="-26" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="26" fill="#0E0E0E" letter-spacing="-0.5">Tier 2 FCFS</text>
    <text x="0" y="42" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#0E0E0E">0.002 ETH</text>
    <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">approved and bound</text>
    <text x="0" y="80" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">1 / wallet</text>
  </g>
  <!-- Public -->
  <g transform="translate(1020, 380)">
    <circle cx="0" cy="0" r="14" fill="#0E0E0E" stroke="#0E0E0E" stroke-width="2"/>
    <text x="0" y="-50" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">12:30 EDT</text>
    <text x="0" y="-26" text-anchor="middle" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="26" fill="#0E0E0E" letter-spacing="-0.5">Public</text>
    <text x="0" y="42" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#0E0E0E">0.005 ETH</text>
    <text x="0" y="62" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">open round</text>
    <text x="0" y="80" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#5C5C5C">10 / wallet</text>
  </g>

  <!-- bottom totals row -->
  <g transform="translate(60, 530)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">TOTAL SUPPLY</text>
    <text x="0" y="32" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="36" fill="#0E0E0E" letter-spacing="-0.8">1,969 editions · ERC-721</text>
  </g>

  <!-- footer -->
  <text x="60" y="640" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#0E0E0E">opensea.io/collection/the1969</text>
  <text x="1140" y="640" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#0E0E0E">@the1969eth</text>
</svg>
