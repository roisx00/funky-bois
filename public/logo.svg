<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 36" width="148" height="36">
  <!-- Circle mark with neon ring -->
  <circle cx="18" cy="18" r="14" fill="#00FFB2" fill-opacity="0.08"/>
  <circle cx="18" cy="18" r="14" fill="none" stroke="#00FFB2" stroke-width="1.5"/>
  <!-- Accent dot -->
  <circle cx="27" cy="9" r="2.2" fill="#00FFB2"/>
  <!-- FB letters -->
  <text x="18" y="24" font-family="Georgia,serif" font-size="14" font-weight="900" fill="#00FFB2" text-anchor="middle">FB</text>

  <!-- Divider line -->
