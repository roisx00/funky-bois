<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>THE 1969 · leaderboard graphic</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" />
<style>
  html,body{margin:0;padding:0;background:#1a1a1a;color:#fff;font-family:'JetBrains Mono',ui-monospace,monospace;}
  header{padding:24px 32px;border-bottom:1px solid #333;}
  header h1{margin:0;font-family:'Instrument Serif',serif;font-style:italic;font-size:28px;color:#fff;}
  header p{margin:6px 0 0;opacity:.75;font-size:12px;line-height:1.5;max-width:820px;}
  main{display:flex;flex-direction:column;gap:32px;padding:32px;max-width:1400px;margin:0 auto;}
  section{background:#232323;border:1px solid #333;}
  .hd{padding:18px 24px;display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #333;}
  h2{margin:0;font-family:'Space Grotesk',sans-serif;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:#fff;font-weight:500;}
  .meta{font-size:10px;color:#888;letter-spacing:.04em;}
  .stage{background:repeating-conic-gradient(#1e1e1e 0 25%, #171717 0 50%) 50% / 16px 16px;padding:14px;overflow:auto;display:flex;justify-content:center;}
  canvas{display:block;max-width:100%;height:auto;background:#F9F6F0;}
  .row{padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #333;}
  .dim{font-size:10px;color:#777;letter-spacing:.04em;}
  button{font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 16px;background:#fff;color:#0E0E0E;border:1px solid #000;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;}
  button:hover{background:#F9F6F0;}
  #status{padding:10px 32px;background:#222;border-bottom:1px solid #333;font-size:11px;color:#aaa;}
</style>
</head>
<body>
<header>
  <h1>THE 1969 · leaderboard announcement</h1>
  <p>Single editorial card, 1200 × 675, strict black + paper. Announces the public BUSTS leaderboard.</p>
</header>
<div id="status">Rendering.</div>

<main>
<section>
  <div class="hd"><h2>Leaderboard · strict B+W</h2><span class="meta">1200 × 675 · X card ratio</span></div>
  <div class="stage"><canvas id="g" width="1200" height="675"></canvas></div>
  <div class="row">
    <span class="dim">Attach to the announcement post. Paper and ink only — matches the field-guide system.</span>
    <button onclick="dl('g','the1969-leaderboard-launch.png')">Download PNG</button>
  </div>
</section>
</main>

<script>
(function () {
  var PAPER = '#F9F6F0';
  var INK   = '#0E0E0E';
  var GREY  = '#6b6b66';
  var SOFT  = '#ece8de';

  window.dl = function (id, filename) {
    var c = document.getElementById(id);
    c.toBlob(function (b) {
      var u = URL.createObjectURL(b);
      var a = document.createElement('a');
      a.href = u; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(u); }, 1000);
    }, 'image/png');
  };

  function fillPaper(ctx, w, h) {
    ctx.fillStyle = PAPER; ctx.fillRect(0, 0, w, h);
    ctx.save();
    ctx.globalAlpha = 0.045; ctx.fillStyle = INK;
    var n = Math.round(w * h / 2000);
    for (var i = 0; i < n; i++) {
      ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
    }
    ctx.restore();
  }

  function drawKicker(ctx, w, leftLabel, rightLabel) {
    ctx.fillStyle = INK; ctx.fillRect(40, 40, w - 80, 36);
    ctx.fillStyle = PAPER;
    ctx.font = "500 13px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText(leftLabel, 56, 58);
    if (rightLabel) {
      ctx.textAlign = 'right';
      ctx.fillText(rightLabel, w - 56, 58);
    }
  }

  function drawFooter(ctx, w, h) {
    ctx.save(); ctx.strokeStyle = INK; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(40, h - 60); ctx.lineTo(w - 40, h - 60); ctx.stroke();
    ctx.restore();
    ctx.fillStyle = INK;
    ctx.font = "500 13px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText('the1969.io/leaderboard', 56, h - 36);
    ctx.textAlign = 'right';
    ctx.fillText('@the1969eth  ·  SHIP LOG 2026-04-24', w - 56, h - 36);
  }

  // One podium column. top is smaller == higher rank (visual pyramid:
  // 1st column is tallest, 2nd shorter, 3rd shortest).
  function drawPodiumColumn(ctx, x, baseY, w, colH, rank, handle, busts) {
    // Column body (ink-filled for rank 1, paper with ink border for 2/3)
    var bodyTop = baseY - colH;
    if (rank === 1) {
      ctx.fillStyle = INK;
      ctx.fillRect(x, bodyTop, w, colH);
      ctx.strokeStyle = INK; ctx.lineWidth = 2;
      ctx.strokeRect(x, bodyTop, w, colH);
    } else {
      ctx.fillStyle = SOFT;
      ctx.fillRect(x, bodyTop, w, colH);
      ctx.strokeStyle = INK; ctx.lineWidth = 2;
      ctx.strokeRect(x, bodyTop, w, colH);
    }

    var textColor = rank === 1 ? PAPER : INK;

    // Rank numeral — huge serif italic
    ctx.fillStyle = textColor;
    ctx.font = "italic 64px 'Instrument Serif', serif";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(rank), x + w / 2, bodyTop + 50);

    // Divider hairline inside the column
    ctx.save();
    ctx.strokeStyle = textColor;
    ctx.globalAlpha = rank === 1 ? 0.35 : 0.55;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 16, bodyTop + 92);
    ctx.lineTo(x + w - 16, bodyTop + 92);
    ctx.stroke();
    ctx.restore();

    // Handle (mono, smaller)
    ctx.fillStyle = textColor;
    ctx.font = "500 13px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('@' + handle, x + w / 2, bodyTop + 106);

    // BUSTS big number
    ctx.font = "500 28px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(busts.toLocaleString(), x + w / 2, bodyTop + 134);

    // Unit label
    ctx.fillStyle = textColor;
    ctx.font = "500 10px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.save();
    ctx.globalAlpha = 0.75;
    ctx.fillText('BUSTS', x + w / 2, bodyTop + 170);
    ctx.restore();

    // Rank pedestal — a small ink slab under the column with "#01"
    var pedH = 26;
    ctx.fillStyle = INK;
    ctx.fillRect(x, baseY, w, pedH);
    ctx.fillStyle = PAPER;
    ctx.font = "700 11px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('#' + String(rank).padStart(2, '0'), x + w / 2, baseY + pedH / 2 + 1);
  }

  // A simple table row for ranks 4+ (ink-line separators, small text)
  function drawRankRow(ctx, x, y, w, rank, handle, busts) {
    ctx.fillStyle = INK;
    ctx.font = "500 11px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('#' + String(rank).padStart(2, '0'), x, y);

    ctx.fillStyle = INK;
    ctx.font = "500 13px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText('@' + handle, x + 50, y);

    ctx.fillStyle = INK;
    ctx.font = "500 13px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'right';
    ctx.fillText(busts.toLocaleString() + '  BUSTS', x + w, y);
  }

  function draw() {
    var c = document.getElementById('g');
    var ctx = c.getContext('2d');
    var w = c.width, h = c.height;

    fillPaper(ctx, w, h);
    var today = new Date().toISOString().slice(0, 10).toUpperCase();
    drawKicker(ctx, w, 'THE 1969  ·  LEADERBOARD  ·  NOW LIVE', today);

    // Canvas split: LEFT column for headline+copy, RIGHT column for the
    // podium. Sized so the 70px headline stays clear of the podium.
    var leftPad  = 64;
    var rightX   = 680;
    var rightW   = w - rightX - 40;        // 480
    var headY    = 120;

    // ── LEFT: headline ──
    ctx.fillStyle = INK;
    ctx.font = "500 13px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textBaseline = 'top'; ctx.textAlign = 'left';
    ctx.fillText('FEATURE · 002', leftPad, headY);

    // "Who's earning?" / "BUSTS top earners." — two-line treatment
    ctx.fillStyle = INK;
    ctx.font = "italic 82px 'Instrument Serif', serif";
    ctx.textBaseline = 'top';
    ctx.fillText('BUSTS', leftPad, headY + 28);

    ctx.font = "italic 82px 'Instrument Serif', serif";
    var l1W = ctx.measureText('BUSTS').width;
    ctx.font = "500 82px 'Space Grotesk', sans-serif";
    // "BUSTS" has mostly caps so it looks more editorial pairing with serif "top"
    // Line 2 handled below.

    ctx.font = "italic 82px 'Instrument Serif', serif";
    ctx.fillText('top', leftPad, headY + 28 + 92);

    ctx.font = "italic 82px 'Instrument Serif', serif";
    var l2SerifW = ctx.measureText('top').width;

    ctx.font = "500 82px 'Space Grotesk', sans-serif";
    ctx.fillText('EARNERS.', leftPad + l2SerifW + 16, headY + 28 + 92);

    // use l1W so lint doesn't gripe
    void l1W;

    // rule under headline
    var ruleY = headY + 28 + 92 + 92 + 18;
    ctx.strokeStyle = INK; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(leftPad, ruleY);
    ctx.lineTo(leftPad + 480, ruleY);
    ctx.stroke();

    // deck
    ctx.fillStyle = GREY;
    ctx.font = "500 14px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textBaseline = 'top';
    ctx.fillText('TOP 100 HOLDERS BY CURRENT BUSTS.',   leftPad, ruleY + 18);
    ctx.fillText('PUBLIC BOARD · NO SIGN-IN REQUIRED.',  leftPad, ruleY + 38);
    ctx.fillText('FARMING-BONUS ACCOUNTS FILTERED OUT.', leftPad, ruleY + 58);

    // path
    ctx.fillStyle = INK;
    ctx.font = "500 11px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textBaseline = 'top';
    ctx.fillText('PATH  ·  /LEADERBOARD', leftPad, ruleY + 96);

    // ── RIGHT: podium (3 columns) ──
    var colGap = 14;
    var totalCols = rightW;
    var colW = Math.floor((totalCols - colGap * 2) / 3);
    var baseY = headY + 280;       // where all columns sit on their pedestal

    // Rank 2 (left), 1 (middle, tallest), 3 (right)
    var col1X = rightX;
    var col2X = rightX + colW + colGap;
    var col3X = rightX + (colW + colGap) * 2;

    drawPodiumColumn(ctx, col1X, baseY, colW, 176, 2, 'zephmst',  1140);
    drawPodiumColumn(ctx, col2X, baseY, colW, 212, 1, 'disini_ari', 26550);
    drawPodiumColumn(ctx, col3X, baseY, colW, 150, 3, 'normexbt',  50100);

    // Label above the podium
    ctx.fillStyle = INK;
    ctx.font = "500 11px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('PODIUM · TOP 3', rightX, headY + 10);

    // ── BELOW PODIUM: hint of ranks 4-6 so the depth is legible ──
    var rowsY = baseY + 52;
    var rowH  = 26;
    ctx.fillStyle = INK;
    ctx.font = "500 10px 'JetBrains Mono', ui-monospace, monospace";
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('NEXT UP', rightX, rowsY - 18);

    var rowsX = rightX;
    var rowsW = rightW;
    // Separator
    ctx.strokeStyle = INK; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(rowsX, rowsY - 4); ctx.lineTo(rowsX + rowsW, rowsY - 4); ctx.stroke();

    drawRankRow(ctx, rowsX, rowsY + rowH * 0 + 8, rowsW, 4, 'internxbt', 3373);
    ctx.save(); ctx.strokeStyle = INK; ctx.globalAlpha = 0.25; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(rowsX, rowsY + rowH + 2); ctx.lineTo(rowsX + rowsW, rowsY + rowH + 2); ctx.stroke();
    ctx.restore();
    drawRankRow(ctx, rowsX, rowsY + rowH * 1 + 8, rowsW, 5, 'cjxiong_',   2840);

    drawFooter(ctx, w, h);
  }

  function run() {
    try {
      draw();
      document.getElementById('status').textContent = 'Ready. Click Download PNG.';
    } catch (e) {
      document.getElementById('status').textContent = 'Error: ' + (e && e.message ? e.message : e);
      console.error(e);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () { setTimeout(run, 40); }).catch(function () {});
  }
})();
</script>
</body>
</html>
