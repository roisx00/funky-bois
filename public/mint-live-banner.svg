<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, system-ui, sans-serif">
  <!-- BACKGROUND (black rupture vs the paper-bg countdown posts) -->
  <rect width="1600" height="900" fill="#0A0A0A"/>

  <!-- Subtle lime grid for texture -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(215,255,58,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="42%" r="60%">
      <stop offset="0%"   stop-color="rgba(215,255,58,0.12)"/>
      <stop offset="60%"  stop-color="rgba(215,255,58,0.02)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#vignette)"/>

  <!-- TOP LIME RIBBON -->
  <rect x="0" y="0" width="1600" height="6" fill="#D7FF3A"/>

  <!-- TOP RULE -->
  <line x1="72" y1="78" x2="1528" y2="78" stroke="rgba(249,246,240,0.18)" stroke-width="1"/>

  <!-- KICKER + LIVE PULSE -->
  <g transform="translate(72, 56)">
    <circle cx="6" cy="-4" r="8" fill="#D7FF3A">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="26" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#D7FF3A">LIVE · NOW MINTING</text>
  </g>

  <text x="1528" y="56" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.2" fill="rgba(249,246,240,0.7)">MAY 1 · 14:00 UTC</text>

  <!-- ── HERO ── -->
  <g transform="translate(800, 320)">
    <text x="0" y="0" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="220" fill="#F9F6F0"
          letter-spacing="-5">Mint is <tspan fill="#D7FF3A">live.</tspan></text>
  </g>

  <!-- ── SUB-LINE ── -->
  <g transform="translate(800, 400)">
    <text x="0" y="0" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="40" fill="rgba(249,246,240,0.85)"
          letter-spacing="-0.5">1969 portraits. One shot.</text>
  </g>

  <!-- ── OPENSEA CALLOUT (lime ribbon) ── -->
  <g transform="translate(72, 580)">
    <rect x="0" y="0" width="1456" height="92" fill="#D7FF3A"/>
    <text x="40" y="58"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="22" font-weight="700" letter-spacing="6" fill="#0E0E0E">MINT ON OPENSEA</text>
    <text x="730" y="60" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="38" fill="#0E0E0E"
          letter-spacing="-0.5">link in first reply.</text>
    <text x="1416" y="58" text-anchor="end"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="44" fill="#0E0E0E" letter-spacing="-1">→</text>
  </g>

  <!-- ── VAULT REASSURANCE STRIP ── -->
  <g transform="translate(72, 720)">
    <line x1="0" y1="0" x2="1456" y2="0" stroke="rgba(249,246,240,0.18)" stroke-width="1"/>
    <text x="728" y="38" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="14" font-weight="700" letter-spacing="3.6" fill="#D7FF3A">THE VAULT NEVER BURNS · WITHDRAW ANYTIME</text>
    <text x="728" y="74" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-size="22" fill="rgba(249,246,240,0.55)" letter-spacing="-0.3">your token, your custody, always.</text>
  </g>

  <!-- BOTTOM RULE + FOOTER -->
  <line x1="72" y1="852" x2="1528" y2="852" stroke="rgba(249,246,240,0.18)" stroke-width="1"/>
  <text x="72"   y="884" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#F9F6F0">@THE1969ETH</text>
  <text x="800"  y="884" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="rgba(249,246,240,0.45)">ETH MAINNET · ERC-721 · 0x890d…7efab</text>
  <text x="1528" y="884" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#F9F6F0">THE1969.IO</text>

  <!-- Bottom lime ribbon -->
  <rect x="0" y="894" width="1600" height="6" fill="#D7FF3A"/>
</svg>
