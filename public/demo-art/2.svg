<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" shape-rendering="crispEdges">
  <rect width="800" height="800" fill="#F9F6F0"/>
  <rect x="40" y="40" width="720" height="720" fill="none" stroke="#0E0E0E" stroke-width="2"/>
  <!-- profile silhouette of a bust facing right -->
  <path d="M 200 720
           L 200 540
           L 240 480
           L 240 400
           L 280 360
           L 280 280
           L 320 220
           L 380 200
           L 460 200
           L 520 240
           L 540 320
           L 520 380
           L 540 420
           L 560 460
           L 540 500
           L 520 520
           L 480 540
           L 480 600
           L 600 600
           L 600 720
           Z"
        fill="#0E0E0E"/>
  <!-- eye notch -->
  <rect x="460" y="300" width="20" height="14" fill="#F9F6F0"/>
  <!-- lip line -->
  <rect x="500" y="360" width="40" height="6" fill="#F9F6F0"/>
  <text x="60" y="100" font-family="ui-monospace, monospace" font-size="14" letter-spacing="3" fill="#0E0E0E">PROFILE STUDY</text>
  <text x="740" y="100" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#5C5C5C">SAMPLE</text>
</svg>
