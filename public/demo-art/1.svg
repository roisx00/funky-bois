<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" shape-rendering="crispEdges">
  <rect width="800" height="800" fill="#F9F6F0"/>
  <!-- frame -->
  <rect x="40" y="40" width="720" height="720" fill="none" stroke="#0E0E0E" stroke-width="2"/>
  <!-- pedestal -->
  <rect x="200" y="640" width="400" height="80" fill="#0E0E0E"/>
  <rect x="240" y="600" width="320" height="40" fill="#0E0E0E"/>
  <!-- shoulders -->
  <rect x="200" y="480" width="400" height="120" fill="#0E0E0E"/>
  <!-- neck -->
  <rect x="370" y="420" width="60" height="60" fill="#0E0E0E"/>
  <!-- head -->
  <rect x="280" y="200" width="240" height="240" fill="#0E0E0E"/>
  <!-- highlight side -->
  <rect x="280" y="200" width="20" height="240" fill="#3a3a3a"/>
  <!-- eye sockets -->
  <rect x="320" y="280" width="40" height="20" fill="#F9F6F0"/>
  <rect x="440" y="280" width="40" height="20" fill="#F9F6F0"/>
  <!-- lips -->
