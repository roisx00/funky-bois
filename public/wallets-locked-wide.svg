<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, system-ui, sans-serif">
  <!-- BACKGROUND -->
  <rect width="1600" height="900" fill="#F9F6F0"/>

  <!-- TOP LIME RIBBON -->
  <rect x="0" y="0" width="1600" height="6" fill="#D7FF3A"/>

  <!-- TOP RULE -->
  <line x1="72" y1="78" x2="1528" y2="78" stroke="#0E0E0E" stroke-width="1"/>

  <!-- KICKER -->
  <g transform="translate(72, 56)">
    <circle cx="6" cy="-4" r="6.5" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.4"/>
    <text x="24" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">THE 1969 · ALLOWLIST · LOCKED</text>
  </g>

  <text x="1528" y="56" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="3.2" fill="#0E0E0E">MAY 1 · 14:00 UTC</text>

  <!-- VERTICAL DIVIDER -->
  <line x1="800" y1="160" x2="800" y2="740" stroke="#0E0E0E" stroke-width="1"/>

  <!-- ── LEFT: MINT STARTS IN 4 HOURS ── -->
  <g transform="translate(400, 280)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="16" font-weight="700" letter-spacing="6" fill="#5C5C5C">MINT STARTS IN</text>

    <text x="0" y="200" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="240" fill="#0E0E0E"
          letter-spacing="-6">4</text>

    <text x="0" y="290" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="68" fill="#0E0E0E"
          letter-spacing="-1">hours.</text>

    <line x1="-90" y1="330" x2="90" y2="330" stroke="#D7FF3A" stroke-width="10"/>
  </g>

  <!-- ── RIGHT: ALLOWLIST STATE ── -->
  <g transform="translate(1200, 280)">
    <text x="0" y="0" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="16" font-weight="700" letter-spacing="6" fill="#5C5C5C">ALL ELIGIBLE WALLETS</text>

    <text x="0" y="200" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="200" fill="#0E0E0E"
          letter-spacing="-5">are in.</text>

    <text x="0" y="290" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="58" fill="#5C5C5C" letter-spacing="-0.5">doors shut.</text>
  </g>

  <!-- LIME RIBBON -->
  <g transform="translate(72, 770)">
    <rect x="0" y="0" width="1456" height="58" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1.4"/>
    <text x="728" y="40" text-anchor="middle"
          font-family="'Instrument Serif', Georgia, serif"
          font-style="italic" font-weight="500"
          font-size="34" fill="#0E0E0E" letter-spacing="-0.5">no new wallets. one shot.</text>
  </g>

  <!-- BOTTOM RULE -->
  <line x1="72" y1="852" x2="1528" y2="852" stroke="#0E0E0E" stroke-width="1"/>

  <!-- FOOTER -->
  <text x="72" y="884" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">@THE1969ETH</text>
  <text x="1528" y="884" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3.4" fill="#0E0E0E">THE1969.IO</text>
</svg>
