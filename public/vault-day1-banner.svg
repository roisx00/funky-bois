<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- BG -->
  <rect width="1920" height="1080" fill="#0E0E0E"/>

  <!-- soft lime glow -->
  <radialGradient id="g" cx="20%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#D7FF3A" stop-opacity="0.10"/>
    <stop offset="60%" stop-color="#D7FF3A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#g)"/>

  <!-- vault-cell grid -->
  <g opacity="0.05" stroke="#F9F6F0" stroke-width="1">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="320" y1="0" x2="320" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#D7FF3A" stroke-width="3" fill="none">
    <path d="M 50 50 L 50 100 M 50 50 L 100 50"/>
    <path d="M 1870 50 L 1870 100 M 1870 50 L 1820 50"/>
    <path d="M 50 1030 L 50 980 M 50 1030 L 100 1030"/>
    <path d="M 1870 1030 L 1870 980 M 1870 1030 L 1820 1030"/>
  </g>

  <!-- TOP META -->
  <g transform="translate(100, 130)">
    <circle cx="6" cy="-4" r="6" fill="#D7FF3A" stroke="#0E0E0E" stroke-width="1"/>
    <text x="22" y="0" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" letter-spacing="4" fill="#F9F6F0" opacity="0.7">THE 1969 · VAULT · ECONOMY</text>
  </g>
  <text x="1820" y="126" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#F9F6F0" opacity="0.5">ISSUE 2026-04-29</text>

  <!-- HEADLINE -->
  <text x="100" y="290" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="92" fill="#F9F6F0" letter-spacing="-2">the keeps are filling.</text>
  <line x1="100" y1="320" x2="280" y2="320" stroke="#D7FF3A" stroke-width="6"/>
  <text x="100" y="370" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#F9F6F0" opacity="0.65">across every keep. real numbers, real time.</text>

  <!-- 4 STAT CELLS -->
  <!-- Cell 1: TVL (lime hero) -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="420" height="380" fill="rgba(215,255,58,0.08)" stroke="#D7FF3A" stroke-width="2"/>
    <text x="28" y="56" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="4" fill="#D7FF3A" opacity="0.85">CUMULATIVE TVL</text>
    <text x="28" y="240" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#D7FF3A" letter-spacing="-2">318,222</text>
    <text x="28" y="290" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#F9F6F0">BUSTS LOCKED</text>
    <line x1="28" y1="320" x2="116" y2="320" stroke="#D7FF3A" stroke-width="3"/>
    <text x="28" y="350" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#F9F6F0" opacity="0.7">held inside the keeps.</text>
  </g>

  <!-- Cell 2: portraits bound -->
  <g transform="translate(560, 480)">
    <rect x="0" y="0" width="420" height="380" fill="transparent" stroke="rgba(249,246,240,0.18)" stroke-width="2"/>
    <text x="28" y="56" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="4" fill="#F9F6F0" opacity="0.55">PORTRAITS BOUND</text>
    <text x="28" y="240" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="140" fill="#F9F6F0" letter-spacing="-2">402</text>
    <text x="28" y="290" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#F9F6F0">PORTRAITS</text>
    <line x1="28" y1="320" x2="116" y2="320" stroke="#D7FF3A" stroke-width="3"/>
    <text x="28" y="350" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#F9F6F0" opacity="0.7">bonded to a keep.</text>
  </g>

  <!-- Cell 3: BUSTS distributed -->
  <g transform="translate(1020, 480)">
    <rect x="0" y="0" width="420" height="380" fill="transparent" stroke="rgba(249,246,240,0.18)" stroke-width="2"/>
    <text x="28" y="56" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="4" fill="#F9F6F0" opacity="0.55">DISTRIBUTED</text>
    <text x="28" y="240" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="140" fill="#F9F6F0" letter-spacing="-2">323</text>
    <text x="28" y="290" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#F9F6F0">BUSTS PAID</text>
    <line x1="28" y1="320" x2="116" y2="320" stroke="#D7FF3A" stroke-width="3"/>
    <text x="28" y="350" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#F9F6F0" opacity="0.7">back to holders.</text>
  </g>

  <!-- Cell 4: vaults active -->
  <g transform="translate(1480, 480)">
    <rect x="0" y="0" width="340" height="380" fill="transparent" stroke="rgba(249,246,240,0.18)" stroke-width="2"/>
    <text x="28" y="56" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="4" fill="#F9F6F0" opacity="0.55">VAULTS ACTIVE</text>
    <text x="28" y="240" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="500" font-size="120" fill="#F9F6F0" letter-spacing="-2">2,493</text>
    <text x="28" y="290" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" letter-spacing="6" fill="#F9F6F0">KEEPS</text>
    <line x1="28" y1="320" x2="116" y2="320" stroke="#D7FF3A" stroke-width="3"/>
    <text x="28" y="350" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#F9F6F0" opacity="0.7">claimed and standing.</text>
  </g>

  <!-- DOCTRINE -->
  <text x="960" y="950" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" letter-spacing="6" fill="#D7FF3A" opacity="0.85">⌬ THE VAULT MUST NOT BURN AGAIN</text>

  <!-- footer -->
  <line x1="100" y1="990" x2="1820" y2="990" stroke="#F9F6F0" stroke-opacity="0.18" stroke-width="1"/>
  <text x="100" y="1030" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#F9F6F0" opacity="0.65">the1969.io/vault</text>
  <text x="960" y="1030" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#F9F6F0" opacity="0.4">§11 · LITEPAPER</text>
  <text x="1820" y="1030" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3" fill="#F9F6F0" opacity="0.65">@the1969eth</text>
</svg>
